version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg12
    container_name: timescaledb
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - timescale-data:/var/lib/postgresql/data
    networks:
      - exchange-net

  redis:
    image: redis:latest
    container_name: redis
    networks:
      - exchange-net

  engine:
    build:
      context: ../engine
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
    restart: unless-stopped
    networks:
      - exchange-net

  api:
    build:
      context: ../api
    depends_on:
      - redis
      - timescaledb
    environment:
      REDIS_URL: redis://redis:6379
      DB_HOST: timescaledb
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: 5432
    restart: unless-stopped
    networks:
      - exchange-net

  ws:
    build:
      context: ../ws
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
    restart: unless-stopped
    networks:
      - exchange-net

  db-processor:
    build:
      context: ../db
    depends_on:
      - redis
      - timescaledb
    environment:
      REDIS_URL: redis://redis:6379
      DB_HOST: timescaledb
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: 5432
    restart: unless-stopped
    networks:
      - exchange-net

  db-cron:
    build:
      context: ../db
    command: node dist/cron.js
    depends_on:
      - timescaledb
    environment:
      DB_HOST: timescaledb
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: 5432
    restart: unless-stopped
    networks:
      - exchange-net

  mm:
    build:
      context: ../mm
    depends_on:
      - api
    environment:
      API_URL: http://api:3000
    restart: unless-stopped
    networks:
      - exchange-net

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    depends_on:
      - api
      - ws
    restart: unless-stopped
    networks:
      - exchange-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
      - ws
    restart: unless-stopped
    networks:
      - exchange-net

networks:
  exchange-net:

volumes:
  timescale-data:
